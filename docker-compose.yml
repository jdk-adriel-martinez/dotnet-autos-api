services:
  postgres:
    image: postgres:17-alpine
    container_name: autos-postgres
    environment:
      POSTGRES_DB: autosdb
      POSTGRES_USER: autos_user
      POSTGRES_PASSWORD: autos_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autos_user -d autosdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: autos-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=autosdb;Username=autos_user;Password=autos_password
    ports:
      - "8080:8080"

volumes:
  postgres_data:
